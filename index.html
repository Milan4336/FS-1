<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nexus Experiment Hub | Full Stack Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --glass-blur: blur(20px);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: drift 20s infinite alternate; }
        .blob-1 { width: 500px; height: 500px; background: var(--primary); top: -100px; right: -100px; }
        .blob-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; left: -50px; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 40px) scale(1.1); } }

        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .exp-number {
            font-weight: 800;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hover-img {
            height: 120px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            opacity: 0.2;
            transition: 0.4s;
        }

        .glass-card:hover .hover-img { opacity: 0.5; }

        .btn-nexus {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 800;
            color: white;
            transition: 0.3s;
        }
        .btn-nexus:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); color: white; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="navbar py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-3 text-white" href="#">Nexus<span style="color: var(--primary);">Hub</span></a>
            <span class="badge bg-primary rounded-pill px-3 py-2">Full Stack Collection v2.0</span>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="text-center mb-5 animate-fade">
            <h1 class="display-4 fw-bold">The <span style="color: var(--secondary);">Grand Collection</span></h1>
            <p class="text-muted lead">10 Full-Stack Experiments • MERN • DevOps • Cloud Architecture</p>
        </div>

        <div class="row g-4">
            <!-- Experiments Loop -->
            <script>
                const exps = [
                    { id: 1, title: "Modern Landing", tags: "HTML, CSS", icon: "💎" },
                    { id: 2, title: "Interactive Canvas", tags: "Vanilla JS", icon: "🎨" },
                    { id: 3, title: "Real-time Chat", tags: "Socket.io", icon: "💬" },
                    { id: 4, title: "Data Dashboard", tags: "Chart.js", icon: "📊" },
                    { id: 5, title: "MVC Architecture", tags: "EJS, Express", icon: "🏗️" },
                    { id: 6, title: "API Integrations", tags: "REST API", icon: "🔌" },
                    { id: 7, title: "Redux Store", tags: "State MGMT", icon: "📦" },
                    { id: 8, title: "RBAC Secure", tags: "JWT Auth", icon: "🔐" },
                    { id: 9, title: "DevOps & Nginx", tags: "Docker", icon: "🐳" },
                    { id: 10, title: "Nexus Social", tags: "Capstone", icon: "🛰️" }
                ];

                document.write(exps.map(exp => `
                    <div class="col-md-6 col-lg-4">
                        <a href="./exp${exp.id}/index.html" class="glass-card d-block h-100 p-4">
                            <div class="hover-img rounded-4 mb-4 d-flex align-items-center justify-content-center h1">${exp.icon}</div>
                            <div class="exp-number mb-2">Experiment 0${exp.id}</div>
                            <h4 class="fw-bold mb-2">${exp.title}</h4>
                            <p class="text-muted small mb-0">${exp.tags}</p>
                        </a>
                    </div>
                `).join(''));
            </script>
        </div>
    </main>

    <footer class="container py-5 text-center border-top border-secondary opacity-50 mt-5">
        <p>© 2026 Nexus Full Stack Laboratory. Built for Netlify Deployment.</p>
    </footer>
</body>
</html>
