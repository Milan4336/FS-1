[build]
  command = "npm install && node build-portfolio.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback for React experiments (must come before catch-all)
[[redirects]]
  from = "/exp3/*"
  to = "/exp3/index.html"
  status = 200

[[redirects]]
  from = "/exp7/*"
  to = "/exp7/index.html"
  status = 200

[[redirects]]
  from = "/exp8/*"
  to = "/exp8/index.html"
  status = 200

[[redirects]]
  from = "/exp9/*"
  to = "/exp9/index.html"
  status = 200

[[redirects]]
  from = "/exp10/*"
  to = "/exp10/index.html"
  status = 200

# Hub catch-all (MUST be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
